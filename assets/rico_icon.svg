<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fd1c5"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="102" ry="102" fill="url(#bg)"/>

  <!-- Rico 텍스트 -->
  <text x="256" y="320"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="180"
        font-weight="800"
        fill="#1a2222"
        text-anchor="middle"
        letter-spacing="-10">Rico</text>

  <!-- 스파클 장식 -->
  <circle cx="420" cy="100" r="15" fill="#1a2222" opacity="0.6"/>
  <circle cx="450" cy="140" r="8" fill="#1a2222" opacity="0.4"/>
</svg>
